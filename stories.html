<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Get latest news, tips, guides releted to games only on Rising Insider.">
    <link href='https://stories.risinginsider.com/' rel='canonical'/><link href='https://stories.risinginsider.com/feed' rel='alternate' title='Rising Insider - RSS' type='application/rss+xml'/><link href='https://lh3.googleusercontent.com/-oGwoxw0ywvw/ZKwECEOyHEI/AAAAAAAAFVE/aP8KCQc6e1c5LtZvmTVXqixn445F6vfHACNcBGAsYHQ/h0/risinginsider-192px.png' rel='icon' sizes='192x192'/>
<link href='https://lh3.googleusercontent.com/-KNZHjS0Ja4s/ZKwDKc2anDI/AAAAAAAAFU4/4IdVH94jdvcxdeJq8yBwcoQtqPOfEVlLwCNcBGAsYHQ/h0/risinginsider-180px.png' rel='apple-touch-icon' sizes='180x180'/>
<link href='https://www.risinginsider.com/favicon.ico' rel='icon' type='image/x-icon'/>
<link href='https://www.risinginsider.com/favicon.ico' rel='shortcut icon' type='image/x-icon'/><title>Rising Insider</title>
    <style> img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;border-radius:8px;
        }a {
            text-decoration: none;
        }*{-webkit-tap-highlight-color:transparent}
        /* Basic CSS styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }
        section {
            padding: 2rem;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }
        /* Navigation */
        nav {
            background-color: #444;
            display: flex;
            justify-content: center;
            padding: 1rem;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
        }

    </style>
</head>
<body>
    <header>
        <h1>Rising Insider</h1>
    </header>

    <section id="home">
        <h2>Stories</h2><div id="storyList"></div>
    </section>

    <footer><nav>

        <a href="https://www.risinginsider.com/p/about.html">About</a>
<a href="https://www.risinginsider.com/p/privacy-policy.html">Privacy</a><a href="https://www.risinginsider.com/p/terms-and-conditions.html">Terms</a>
    </nav>
        <p>&copy; <span id="currentYear">2023</span> Rising Insider. All rights reserved.</p>
    </footer><script>
        const currentYear = new Date().getFullYear();
        const yearElement = document.getElementById('currentYear');
        if (yearElement) {
            yearElement.textContent = currentYear;
        }
    </script><script>
        const storyListElement = document.getElementById('storyList');

        fetch('https://raw.githack.com/risinginsider/assets/main/stories.xml')
            .then(response => response.text())
            .then(xmlString => {
                const parser = new DOMParser();
                const xmlDOM = parser.parseFromString(xmlString, 'text/xml');
                const items = xmlDOM.querySelectorAll('item');
                items.forEach(item => {
                    const title = item.querySelector('title').textContent;
                    const link = item.querySelector('link').textContent;

                    // Fetch additional details for each item
                    fetch(link)
                        .then(response => response.text())
                        .then(htmlString => {
                            const htmlDOM = parser.parseFromString(htmlString, 'text/html');
                            const ogImage = htmlDOM.querySelector('meta[property="og:image:url"]');
                            const ogImageURL = ogImage ? ogImage.getAttribute('content') : 'No image available';

                            // Create a div to display the title and image
                            const storyDiv = document.createElement('div');
                            storyDiv.innerHTML = `<h3><a href="${link}">${title}</a></h3><a href="${link}"><img src="${ogImageURL}" alt="${title}"></a><hr>`;
                            storyListElement.appendChild(storyDiv);
                        })
                        .catch(error => console.error(error));
                });
            })
            .catch(error => console.error(error));
    </script>
</body>
</html>
