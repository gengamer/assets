<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a single-page site example with different sections for Home, About, and Contact.">
    <title>Single Page Site</title>
    <style>
        /* Basic CSS styles ... */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }
        nav {
            background-color: #444;
            display: flex;
            justify-content: center;
            padding: 1rem;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
        }
        section {
            padding: 2rem;
        }
        section:not(:target) {
            display: none;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Single Page Site</h1>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="home">
        <h2>Stories</h2>
        <div id="storyList"></div>
    </section>

    <footer>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
        <p>&copy; <span id="currentYear">2023</span> My Single Page Site. All rights reserved.</p>
    </footer>

    <script>
        const storyListElement = document.getElementById('storyList');

        fetch('https://raw.githack.com/risinginsider/assets/main/stories.xml')
            .then(response => response.text())
            .then(xmlString => {
                const parser = new DOMParser();
                const xmlDOM = parser.parseFromString(xmlString, 'text/xml');
                const items = xmlDOM.querySelectorAll('item');
                items.forEach(item => {
                    const title = item.querySelector('title').textContent;
                    const link = item.querySelector('link').textContent;

                    // Fetch additional details for each item
                    fetch(link)
                        .then(response => response.text())
                        .then(htmlString => {
                            const htmlDOM = parser.parseFromString(htmlString, 'text/html');
                            const ogImage = htmlDOM.querySelector('meta[property="og:image"]');
                            const ogImageURL = ogImage ? ogImage.getAttribute('content') : 'No image available';

                            // Create a div to display the title, image, and link
                            const storyDiv = document.createElement('div');
                            storyDiv.innerHTML = `<h3><a href="${link}">${title}</a></h3><a href="${link}"><img src="${ogImageURL}" alt="${title}"></a><br><a href="${link}">Read more</a><hr>`;
                            storyListElement.appendChild(storyDiv);
                        })
                        .catch(error => console.error(error));
                });
            })
            .catch(error => console.error(error));
    </script>
</body>
</html>
